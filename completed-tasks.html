<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bvue42 Lite — Completed Tasks</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#020617">

<link rel="icon" href="icons/icon-192.png">

<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body class="bg-slate-950 text-white min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- Top -->
    <div class="flex items-start gap-4 mb-8">
      <button onclick="window.location.href='owner-dashboard.html'"
        class="bg-slate-900 hover:bg-slate-800 border border-slate-700 w-12 h-12 rounded-2xl flex items-center justify-center text-2xl transition">
        ←
      </button>

      <div>
        <h1 class="text-3xl font-bold">Completed Tasks</h1>
        <p class="text-slate-400 mt-1">All completed tasks in your workspace</p>
      </div>
    </div>

    <!-- Completed Tasks List -->
    <div id="tasksContainer" class="space-y-5">
      <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 text-slate-400">
        Loading completed tasks...
      </div>
    </div>
  </div>

  <script>
    async function guardOwner() {
      const { data: { session }, error } = await sb.auth.getSession();

      if (error || !session || !session.user) {
        window.location.href = "owner-login.html";
        return null;
      }

      return session.user;
    }

    function taskCard(task) {
      return `
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4 mb-5">
            <div>
              <h2 class="text-2xl font-semibold">${task.task_title || "---"}</h2>
              <p class="text-slate-400 mt-2">Assigned to: ${task.employee_name || "Unknown Employee"}</p>
            </div>

            <span class="inline-block px-4 py-2 rounded-full text-sm font-medium bg-emerald-500/20 text-emerald-400 border border-emerald-500/30">
              completed
            </span>
          </div>

          <div class="space-y-4">
            <div class="bg-slate-950 border border-slate-800 rounded-xl p-5">
              <p class="text-sm text-slate-400 mb-2">Timeline</p>
              <p class="text-2xl font-semibold">${task.timeline_hours || 0} hours</p>
            </div>

            <div class="bg-slate-950 border border-slate-800 rounded-xl p-5">
              <p class="text-sm text-slate-400 mb-2">Task Note</p>
              <p class="text-lg font-medium whitespace-pre-wrap">${task.task_note || "---"}</p>
            </div>
          </div>
        </div>
      `;
    }

    async function loadCompletedTasks() {
      try {
        const user = await guardOwner();
        if (!user) return;

        const companyId = localStorage.getItem("bvue_company_id");
        if (!companyId) throw new Error("Missing company session. Login again.");

        const { data: tasks, error } = await sb
          .from("tasks")
          .select("*")
          .eq("company_id", companyId)
          .eq("status", "completed")
          .order("created_at", { ascending: false });

        if (error) throw error;

        const container = document.getElementById("tasksContainer");

        if (!tasks || tasks.length === 0) {
          container.innerHTML = `
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 text-center">
              <p class="text-xl font-semibold">No completed tasks yet</p>
              <p class="text-slate-400 mt-2">Completed tasks will appear here once employees finish them.</p>
            </div>
          `;
          return;
        }

        container.innerHTML = tasks.map(taskCard).join("");

      } catch (err) {
        console.error("Completed tasks load error:", err);
        document.getElementById("tasksContainer").innerHTML = `
          <div class="bg-slate-900 border border-red-500/30 rounded-2xl p-6 text-red-400">
            ${err.message || "Could not load completed tasks."}
          </div>
        `;
      }
    }

    loadCompletedTasks();
  </script>
</body>
</html>z
