<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bvue42 Lite — Employee Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="db.js"></script>
  <link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#020617">

<link rel="icon" href="icons/icon-192.png">

<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-6xl mx-auto px-4 py-8">

    <!-- Top -->
    <div class="flex items-start justify-between gap-4 mb-8">
      <div>
        <h1 class="text-3xl font-bold">Employee Dashboard</h1>
      <p id="companyHeading" class="text-slate-400 mt-1">
Loading company...
</p>
      </div>

      <button id="openSettingsBtn"
        class="bg-slate-900 hover:bg-slate-800 border border-slate-700 w-14 h-14 rounded-2xl flex items-center justify-center text-2xl transition">
        ⚙
      </button>
    </div>

    <!-- Tasks -->
     <div class="grid grid-cols-2 gap-4 mb-8">

  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
    <p class="text-sm text-slate-400 mb-2">Pending</p>
    <p id="pendingCount" class="text-3xl font-bold text-yellow-400">0</p>
  </div>

  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
    <p class="text-sm text-slate-400 mb-2">Completed</p>
    <p id="completedCount" class="text-3xl font-bold text-emerald-400">0</p>
  </div>

</div>
    <div>
      <h2 class="text-2xl font-bold mb-4">My Tasks</h2>
      <div id="tasksContainer" class="space-y-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 text-slate-400">
          Loading tasks...
        </div>
      </div>
    </div>

  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 px-4">
    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl relative">
      
      <button id="closeSettingsBtn"
        class="absolute top-5 right-5 text-slate-400 hover:text-white text-3xl leading-none">
        ×
      </button>

      <h2 class="text-3xl font-bold mb-6">Settings</h2>

      <div class="space-y-4">
        <div class="bg-slate-950 border border-slate-800 rounded-2xl p-5">
          <p class="text-sm text-slate-400 mb-1">Employee Name</p>
          <p id="employeeName" class="text-xl font-semibold">---</p>
        </div>

        <div class="bg-slate-950 border border-slate-800 rounded-2xl p-5">
          <p class="text-sm text-slate-400 mb-1">Login Email</p>
          <p id="employeeEmail" class="text-xl font-semibold break-all">---</p>
        </div>

        <button id="employeeLogoutBtn"
          class="w-full bg-red-500 hover:bg-red-400 text-white font-semibold py-4 rounded-2xl transition mt-2">
          Logout
        </button>
      </div>
    </div>
  </div>

  <script>
    function getEmployeeSession() {
      const employeeId = localStorage.getItem("bvue_employee_id");
      const employeeName = localStorage.getItem("bvue_employee_name");
      const employeeEmail = localStorage.getItem("bvue_employee_email");
      const companyId = localStorage.getItem("bvue_employee_company_id");

      if (!employeeId || !employeeEmail || !companyId) {
        return null;
      }

      return {
        employeeId,
        employeeName,
        employeeEmail,
        companyId
      };
    }

    function redirectToEmployeeLogin() {
      window.location.href = "employee-login.html";
    }

    function statusBadge(status) {
      if (status === "pending") {
        return "bg-yellow-500/20 text-yellow-400 border border-yellow-500/30";
      }
      if (status === "completed") {
        return "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30";
      }
      return "bg-slate-700 text-slate-300 border border-slate-600";
    }

    function taskCard(task) {
      const completed = task.status === "completed";

      return `
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 shadow-xl">
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
            
            <div>
              <h2 class="text-xl font-semibold">${task.task_title || "---"}</h2>
              <p class="text-slate-400 mt-1">Timeline: ${task.timeline_hours || 0} hours</p>
            </div>

            <div class="flex flex-col items-start md:items-end gap-3">
              <span class="inline-block px-3 py-1 rounded-full text-sm font-medium ${statusBadge(task.status)}">
                ${task.status || "unknown"}
              </span>

              ${
                completed
                  ? `<button disabled class="bg-slate-700 text-slate-300 font-semibold px-4 py-2 rounded-xl cursor-not-allowed">
                       Completed
                     </button>`
                  : `<button onclick="markTaskCompleted('${task.id}')"
                       class="bg-emerald-500 hover:bg-emerald-400 text-black font-semibold px-4 py-2 rounded-xl transition">
                       Mark Completed
                     </button>`
              }
            </div>
          </div>

          <div class="mt-5 bg-slate-950 border border-slate-800 rounded-xl p-4">
            <p class="text-sm text-slate-400 mb-1">Task Note</p>
            <p class="font-medium whitespace-pre-wrap">${task.task_note || "---"}</p>
          </div>
        </div>
      `;
    }

    async function loadEmployeeTasks() {
      try {
        const employeeSession = getEmployeeSession();
        if (!employeeSession) {
          redirectToEmployeeLogin();
          return;
        }

        // fill settings info
        document.getElementById("employeeName").textContent = employeeSession.employeeName || "---";
        document.getElementById("employeeEmail").textContent = employeeSession.employeeEmail || "---";

        // Load company name
const { data: company } = await sb
  .from("companies")
  .select("company_name")
  .eq("id", employeeSession.companyId)
  .single();

document.getElementById("companyHeading").textContent =
company?.company_name || "Workspace";

// Load employee tasks
const { data: tasks, error } = await sb
  .from("tasks")
  .select("*")
  .eq("employee_id", employeeSession.employeeId)
  .eq("company_id", employeeSession.companyId)
  .order("created_at", { ascending: false });

        if (error) throw error;
        let pending = 0;
let completed = 0;

(tasks || []).forEach(task => {

    if(task.status === "pending")
        pending++;

    if(task.status === "completed")
        completed++;

});

document.getElementById("pendingCount").textContent = pending;
document.getElementById("completedCount").textContent = completed;

        const container = document.getElementById("tasksContainer");

        if (!tasks || tasks.length === 0) {
  container.innerHTML = `
    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 text-center">

      <div class="text-5xl mb-4">🎉</div>

      <p class="text-2xl font-bold">
        You're all caught up!
      </p>

      <p class="text-slate-400 mt-3">
        No pending tasks right now.
      </p>

    </div>
  `;
  return;
}

        container.innerHTML = tasks.map(taskCard).join("");

      } catch (err) {
        console.error("Load employee tasks error:", err);
        document.getElementById("tasksContainer").innerHTML = `
          <div class="bg-slate-900 border border-red-500/30 rounded-2xl p-6 text-red-400">
            ${err.message || "Could not load tasks."}
          </div>
        `;
      }
    }

    async function markTaskCompleted(taskId) {
      try {
        const { error } = await sb
          .from("tasks")
          .update({ status: "completed" })
          .eq("id", taskId);

        if (error) throw error;

        await loadEmployeeTasks();
      } catch (err) {
        console.error("Mark complete error:", err);
        alert(err.message || "Could not update task.");
      }
    }

    // settings modal
    const settingsModal = document.getElementById("settingsModal");
    const openSettingsBtn = document.getElementById("openSettingsBtn");
    const closeSettingsBtn = document.getElementById("closeSettingsBtn");

    openSettingsBtn.addEventListener("click", () => {
      settingsModal.classList.remove("hidden");
      settingsModal.classList.add("flex");
    });

    closeSettingsBtn.addEventListener("click", () => {
      settingsModal.classList.add("hidden");
      settingsModal.classList.remove("flex");
    });

    settingsModal.addEventListener("click", (e) => {
      if (e.target === settingsModal) {
        settingsModal.classList.add("hidden");
        settingsModal.classList.remove("flex");
      }
    });

    document.getElementById("employeeLogoutBtn").addEventListener("click", () => {
      localStorage.removeItem("bvue_employee_id");
      localStorage.removeItem("bvue_employee_name");
      localStorage.removeItem("bvue_employee_email");
      localStorage.removeItem("bvue_employee_company_id");
      localStorage.removeItem("bvue_employee_workspace_code");

      redirectToEmployeeLogin();
    });

    loadEmployeeTasks();
    window.markTaskCompleted = markTaskCompleted;
  </script>
</body>
</html>
